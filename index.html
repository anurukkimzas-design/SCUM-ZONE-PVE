        /* --- ตั้งค่าพื้นฐานเบื้องต้น --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050608;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;

        /* เอฟเฟกต์แสงฟุ้งสีแดง/เขียวจางๆ ด้านหลังตามรูปภาพต้นฉบับ */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 40%, rgba(0, 255, 136, 0.05) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* ชั้นวางระบบเอฟเฟกต์ละอองไฟ (Particles) */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* เนื้อหาหลักทั้งหมดจะถูกจัดวางเหนือเอฟเฟกต์ */
        .content-wrapper {

            z-index: 3;
            display: flex;
            flex-direction: column;

        .logo {

            font-weight: 900;
            font-size: 22px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        }
        nav ul {

            list-style: none;

            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;

            color: #050608;
            padding: 8px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            transition: all 0.2s;

        .login-btn:hover {

        }

        /* --- ส่วนเนื้อหาหลักกลางหน้าจอ (Hero Section) --- */
        .hero {

            display: flex;
            flex-direction: column;

            align-items: center;

        .tags {

        .title {

            font-weight: 900;
            letter-spacing: 4px;
            color: #ffffff;
            line-height: 1;

        .title span {
            color: #00ff88;
            text-shadow: 0 0 35px rgba(0, 255, 136, 0.65);
        }
        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;

            margin-top: 10px;

            align-items: center;
            gap: 8px;

            letter-spacing: 1px;
            color: #00ff88;

            padding: 6px 18px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: blink 1.5s infinite;
        }

        /* --- ส่วนของปุ่มกดหลักคู่กัน 2 ปุ่ม --- */
        .cta-container {
            display: flex;
            gap: 20px;

        .btn {
            padding: 15px 32px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;

            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-copy {
            background: #00ff88;
            color: #050608;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.25);
        }
        .btn-copy:hover {

            transform: translateY(-2px);
        }
        .btn-discord {
            background: rgba(35, 39, 42, 0.6);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        .btn-discord:hover {
            background: #5865F2; /* เปลี่ยนเป็นสีน้ำเงินเอกลักษณ์ดิสคอร์ดเวลาชี้ */
            border-color: #5865F2;
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(88, 101, 242, 0.4);
        }

        /* --- Animation ไฟกะพริบ --- */
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
