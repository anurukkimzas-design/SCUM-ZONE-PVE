<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[TH] SCUM ZONE PVE Drop Rate x3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap');
        body { background-color: #050505; color: #e2e8f0; font-family: 'Noto Sans Thai', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .particles-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #00ff66, rgba(0,0,0,0));
            background-size: 200px 200px; opacity: 0.3; pointer-events: none;
        }
    </style>
</head>
<body class="antialiased">

    <!-- NAVIGATION -->
    <nav class="border-b border-zinc-800 px-6 py-4 sticky top-0 z-50 bg-black/80 backdrop-blur">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black text-white font-orbitron">SCUM <span class="text-[#00ff66]">ZONE</span></div>
            <button class="bg-[#00ff66] text-black font-black px-6 py-1.5 rounded-full text-xs uppercase hover:bg-green-500 transition">Login</button>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="relative w-full h-[70vh] flex flex-col justify-center items-center text-center">
        <div class="particles-bg"></div>
        <h1 class="text-5xl font-black text-white mb-4 font-orbitron">[TH] SCUM ZONE <span class="text-[#00ff66]">PVE</span></h1>
        <p class="text-gray-400 mb-8 uppercase tracking-widest">Drop Rate x3 | PvE Experience</p>
        
        <div class="mb-8 border border-zinc-700 bg-black px-6 py-2 rounded text-sm flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-[#00ff66] animate-pulse"></span>
            ONLINE: <span id="online-count" class="text-[#00ff66]">กำลังโหลด...</span>
        </div>

        <a href="steam://connect/45.124.213.26:7000" class="bg-[#00ff66]/10 border border-[#00ff66] text-[#00ff66] hover:bg-[#00ff66] hover:text-black font-bold px-8 py-3 rounded-lg transition flex items-center gap-2">
            <i class="fa-solid fa-gamepad"></i> CONNECT TO SERVER
        </a>
    </section>

    <!-- SCRIPT ดึงคนออนไลน์ -->
    <script>
        // 🔴 สำคัญ: นำตัวเลข ID จากท้ายลิงก์ BattleMetrics ของคุณมาใส่ตรงนี้ 🔴
        const SERVER_ID = '0000000'; 

        async function fetchServerData() {
            try {
                const response = await fetch(`https://api.battlemetrics.com/servers/${SERVER_ID}`);
                const data = await response.json();
                const players = data.data.attributes.players;
                const max = data.data.attributes.maxPlayers;
                document.getElementById('online-count').innerText = `${players}/${max}`;
            } catch (e) {
                document.getElementById('online-count').innerText = "ONLINE";
            }
        }
        if(SERVER_ID !== '0000000') fetchServerData();
    </script>
</body>
</html>
